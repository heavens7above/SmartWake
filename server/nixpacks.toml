[providers]
python = "3.11"

[variables]
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
# Note: Do NOT hardcode PORT here — Railway injects it automatically at runtime.

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
# 2>&1 redirects uvicorn's stderr to stdout so Railway shows logs as blue info, not red error
cmd = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} 2>&1'"
