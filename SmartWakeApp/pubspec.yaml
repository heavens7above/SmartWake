name: smart_wake_app
description: SmartWake — Android sleep intelligence app.
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  sensors_plus: ^5.0.0
  battery_plus: ^6.0.1
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^17.2.1
  permission_handler: ^11.3.1
  flutter_foreground_task: ^8.9.1
  intl: ^0.19.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080C18"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
